apiVersion: v1
kind: Namespace
metadata:
  name: horizon-cloud-migration-dev
  labels:
    app.kubernetes.io/part-of: horizon-platform
    horizonrelevance.com/environment: development
    horizonrelevance.com/security-boundary: cloud-migration-sandbox
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cloud-migration-quota
  namespace: horizon-cloud-migration-dev
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "3"
    limits.memory: 4Gi
    requests.storage: 20Gi
    persistentvolumeclaims: "4"
    pods: "12"
    services: "8"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cloud-migration-defaults
  namespace: horizon-cloud-migration-dev
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 500m
        memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-migration-postgresql
  namespace: horizon-cloud-migration-dev
  labels:
    app: cloud-migration-postgresql
spec:
  selector:
    app: cloud-migration-postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cloud-migration-postgresql
  namespace: horizon-cloud-migration-dev
  labels:
    app: cloud-migration-postgresql
spec:
  serviceName: cloud-migration-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: cloud-migration-postgresql
  template:
    metadata:
      labels:
        app: cloud-migration-postgresql
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: horizon-cloud-migration
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              value: cloud_migration
            - name: POSTGRES_USER
              value: cloud_migration
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-migration-runtime
                  key: postgres-password
          ports:
            - name: postgresql
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "cloud_migration", "-d", "cloud_migration"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cloud_migration", "-d", "cloud_migration"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 5Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: horizon-cloud-migration-dev
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ui
  namespace: horizon-cloud-migration-dev
spec:
  podSelector:
    matchLabels:
      app: horizon-cloud-migration-ui
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    - to:
        - podSelector:
            matchLabels:
              app: horizon-cloud-migration-backend
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend
  namespace: horizon-cloud-migration-dev
spec:
  podSelector:
    matchLabels:
      app: horizon-cloud-migration-backend
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
        - podSelector:
            matchLabels:
              app: horizon-cloud-migration-ui
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    - to:
        - podSelector:
            matchLabels:
              app: cloud-migration-postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: horizon-relevance-dev
          podSelector:
            matchLabels:
              app.kubernetes.io/component: openldap
      ports:
        - protocol: TCP
          port: 389
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker
  namespace: horizon-cloud-migration-dev
spec:
  podSelector:
    matchLabels:
      app: horizon-cloud-migration-backend-worker
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: cloud-migration-postgresql
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgresql-from-backend
  namespace: horizon-cloud-migration-dev
spec:
  podSelector:
    matchLabels:
      app: cloud-migration-postgresql
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: horizon-cloud-migration-backend
        - podSelector:
            matchLabels:
              app: horizon-cloud-migration-backend-worker
      ports:
        - protocol: TCP
          port: 5432
