#fullnameOverride: horizon-self-service-cicd-pipeline-backend
namespaceOverride: horizon-relevance-dev
replicaCount: 1

image:
  repository: ankur1825/horizon-self-service-cicd-pipeline-backend
  tag: "1.4.19"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ldap:
  server: "ldap://openldap.horizon-relevance-dev.svc.cluster.local:389"
  bindDN: "cn=admin,dc=horizonrelevance,dc=local"
  baseDN: "ou=users,dc=horizonrelevance,dc=local"
  searchFilter: "(objectClass=inetOrgPerson)"
  uidAttribute: "uid"
  displayNameAttribute: "displayName"
  mailAttribute: "mail"
  managerPasswordSecret:
    name: jenkins-ldap
    key: password

serviceAccount:
  create: false
  name: ""   

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: horizonrelevance.com
      paths:
        - path: /pipeline/api(/|$)(.*)
          pathType: ImplementationSpecific
  # tls:
  #   - secretName: ohatreact-tls
  #     hosts:
  #       - ohhdevops.cernerasp.com

#envFromSecret:
#  name: horizon-self-service-cicd-pipeline-backend 

jenkins:
  user: ankur.kashyap
  token: replace-with-jenkins-api-token
  #user: sg1917459
  #token: 113232cbe431bdfa47ef491bbb07c5b93c        

enterprise:
  licenseEnforcementEnabled: false
  clientId: horizon-internal
  clientName: "Horizon Relevance Internal"
  licenseKey: internal-dev-license
  licenseType: internal
  licenseExpiresAt: "2099-12-31T23:59:59Z"
  enabledPipelines: "Devops Pipeline,Test Devops Pipeline,Prod Devops Pipeline"
  enabledFeatures: "build,artifact_publish,code_scan,image_scan,policy_validation,static_application_security,test_suites,notifications,secret_management,prod_deploy,ai_remediation"
  allowedEnvironments: "DEV,QA,STAGE,EKS-NONPROD,EKS-PROD"
  maxRepos: "999999"
  maxBuildsPerMonth: "999999"
  maxUsers: "999999"
  licenseFile: ""
  licenseMode: offline-file
  licenseSyncEndpoint: ""
  licenseCacheFile: /app/data/enterprise-license-cache.json
  activationTokenSecret:
    existingSecret: ""
    key: ENTERPRISE_LICENSE_ACTIVATION_TOKEN
  signingSecret:
    existingSecret: ""
    key: ENTERPRISE_LICENSE_SIGNING_SECRET

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  storageClass: gp3
  accessMode: ReadWriteOnce
  size: 10Gi  
  mountPath: /app/data  # where SQLite DB will be saved
