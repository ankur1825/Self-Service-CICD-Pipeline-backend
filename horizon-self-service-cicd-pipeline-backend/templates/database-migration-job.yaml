{{- if .Values.database.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "horizon-self-service-cicd-pipeline-backend.fullname" . }}-database-migration
  namespace: {{ .Values.namespaceOverride }}
  labels:
    {{- include "horizon-self-service-cicd-pipeline-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-migration
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ include "horizon-self-service-cicd-pipeline-backend.fullname" . }}
        app.kubernetes.io/component: database-migration
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "horizon-self-service-cicd-pipeline-backend.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alembic
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          workingDir: /app
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.database.migrations.resources | nindent 12 }}
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            {{- if .Values.database.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | quote }}
                  key: {{ .Values.database.key | default "DATABASE_URL" | quote }}
            {{- else if .Values.database.url }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- end }}
          volumeMounts:
            - name: app-data
              mountPath: {{ .Values.persistence.mountPath }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "horizon-self-service-cicd-pipeline-backend.fullname" . }}-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
{{- end }}
