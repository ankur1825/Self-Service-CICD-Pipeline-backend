{{- if and .Values.cloudMigration.worker.enabled .Values.cloudMigration.worker.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (printf "%s-worker" (include "horizon-self-service-cicd-pipeline-backend.fullname" .)) .Values.cloudMigration.worker.serviceAccount.name }}
  namespace: {{ .Values.namespaceOverride }}
  labels:
    {{- include "horizon-self-service-cicd-pipeline-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration-execution-worker
  {{- with .Values.cloudMigration.worker.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.cloudMigration.worker.serviceAccount.automount }}
{{- end }}
