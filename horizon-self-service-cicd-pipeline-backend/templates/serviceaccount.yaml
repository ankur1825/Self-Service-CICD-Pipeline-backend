{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "horizon-self-service-cicd-pipeline-backend.serviceAccountName" . }}
  namespace: {{ .Values.namespaceOverride }}
  labels:
    {{- include "horizon-self-service-cicd-pipeline-backend.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
